<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container">
<h2 class="mt-5">Login</h2>
<div th:if="${param.error}" class="alert alert-danger">Invalid username or password</div>
<div th:if="${param.logout}" class="alert alert-info">You have been logged out</div>
<div th:if="${param.resetSuccess}" class="alert alert-success">Password reset successful. Please login.</div>
<form method="post" th:action="@{/login}" class="mt-3">
    <div class="mb-3">
        <label>Username</label>
        <input type="text" name="username" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Password</label>
        <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary">Login</button>
    <a href="/forgot-password" class="btn btn-link">Forgot password?</a>
    <a href="/register" class="btn btn-link">Register</a>
</form>
</body>
</html>
