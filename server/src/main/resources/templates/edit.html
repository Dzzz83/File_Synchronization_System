<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit File</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container">
<h2 class="mt-5">Editing: <span th:text="${file.relativePath}"></span></h2>
<form th:action="'/files/edit/' + ${file.id}" method="post">
    <input type="hidden" name="originalHash" th:value="${originalHash}" />
    <div class="mb-3">
        <textarea name="content" rows="20" class="form-control" th:text="${content}"></textarea>
    </div>
    <button type="submit" class="btn btn-primary">Save</button>
    <a href="/files" class="btn btn-secondary">Cancel</a>
</form>
</body>
</html>
