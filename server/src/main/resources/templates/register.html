<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container">
<h2 class="mt-5">Register</h2>
<form th:action="@{/register}" th:object="${user}" method="post" class="mt-3">
    <div class="mb-3">
        <label>Username</label>
        <input type="text" th:field="*{username}" class="form-control" required>
        <div th:if="${#fields.hasErrors('username')}" th:errors="*{username}" class="text-danger"></div>
    </div>
    <div class="mb-3">
        <label>Password</label>
        <input type="password" th:field="*{password}" class="form-control" required>
    </div>
    <div class="mb-3">
        <label>Email</label>
        <input type="email" th:field="*{email}" class="form-control" required>
        <div th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-danger"></div>
    </div>
    <button type="submit" class="btn btn-primary">Register</button>
    <a href="/login" class="btn btn-link">Already have an account? Login</a>
</form>
</body>
</html>
