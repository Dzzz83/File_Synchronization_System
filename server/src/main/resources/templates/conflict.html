<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Conflict Resolution</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/diff-match-patch@1.0.5/index.js"></script>
    <style>
        .diff-container { display: flex; gap: 20px; margin-bottom: 20px; }
        .diff-pane { flex: 1; border: 1px solid #dee2e6; border-radius: 5px; padding: 15px; background: #f8f9fa; overflow: auto; max-height: 400px; }
        .diff-pane pre { margin: 0; white-space: pre-wrap; font-family: monospace; }
        .insert { background-color: #d4fcbc; display: inline; }
        .delete { background-color: #fbb; text-decoration: line-through; display: inline; }
        .equal { background-color: transparent; }
        h3 { margin-top: 0; }
    </style>
</head>
<body class="container">
<h2 class="mt-5">Conflict Detected</h2>
<p>The file was modified on the server while you were editing. Please resolve the conflict.</p>

<form th:action="@{/files/edit/resolve}" method="post">
    <input type="hidden" name="fileId" th:value="${fileId}" />

    <div class="diff-container">
        <div class="diff-pane">
            <h3>📄 Server version</h3>
            <pre id="serverPre" th:text="${serverContent}"></pre>
        </div>
        <div class="diff-pane">
            <h3>✏️ Your version</h3>
            <pre id="userPre" th:text="${userContent}"></pre>
        </div>
    </div>

    <div class="mb-3">
        <label for="mergedArea" class="form-label"><strong>Merged version (edit as needed):</strong></label>
        <textarea id="mergedArea" name="resolvedContent" rows="15" class="form-control" th:text="${userContent}"></textarea>
    </div>

    <div class="mb-3">
        <button type="submit" name="strategy" value="server" class="btn btn-outline-secondary">Use Server Version</button>
        <button type="submit" name="strategy" value="user" class="btn btn-outline-secondary">Use My Version</button>
        <button type="submit" name="strategy" value="merge" class="btn btn-primary">Save Merged</button>
        <a href="/files" class="btn btn-danger">Cancel</a>
    </div>
</form>

<script>
    const serverText = document.getElementById('serverPre').innerText;
    const userText = document.getElementById('userPre').innerText;

    const dmp = new diff_match_patch();
    const diffs = dmp.diff_main(serverText, userText);
    dmp.diff_cleanupSemantic(diffs);

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    function buildHtml(diffs, side) {
        let html = '';
        for (let diff of diffs) {
            const text = escapeHtml(diff[1]);
            if (side === 'server' && diff[0] === 1) continue;
            if (side === 'user' && diff[0] === -1) continue;
            let className = '';
            if (diff[0] === -1) className = 'delete';
            else if (diff[0] === 1) className = 'insert';
            else className = 'equal';
            html += `<span class="${className}">${text}</span>`;
        }
        return html;
    }

    document.getElementById('serverPre').innerHTML = buildHtml(diffs, 'server');
    document.getElementById('userPre').innerHTML = buildHtml(diffs, 'user');
</script>
</body>
</html>
