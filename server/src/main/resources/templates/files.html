<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>My Files</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container">
<h2 class="mt-5">My Files</h2>
<div class="mb-3">
    <a href="/files/upload" class="btn btn-primary">Upload New File</a>
    <form action="/logout" method="post" class="d-inline">
        <button type="submit" class="btn btn-secondary">Logout</button>
    </form>
</div>
<table class="table table-bordered">
    <thead>
    <tr><th>Filename</th><th>Size (bytes)</th><th>Last Modified</th><th>Actions</th></tr>
    </thead>
    <tbody>
    <tr th:each="f : ${files}">
        <td th:text="${f.relativePath}"></td>
        <td th:text="${f.size}"></td>
        <td th:text="${f.lastModified}"></td>
        <td>
            <a th:href="'/files/download/' + ${f.id}" class="btn btn-sm btn-success">Download</a>
            <a th:href="'/files/edit/' + ${f.id}" class="btn btn-sm btn-warning">Edit</a>
        </td>
    </tr>
    </tbody>
</table>
</body>
</html>
