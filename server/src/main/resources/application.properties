server.port=8080

# PostgreSQL configuration
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.datasource.hikari.maximumPoolSize=10

# Remove or comment out H2 console
# spring.h2.console.enabled=true
# spring.h2.console.path=/h2-console

logging.level.com.filesync=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.security.web=TRACE
logging.level.org.springframework.security.web.authentication=DEBUG

file.upload-dir=./uploads

storage.type=r2

# R2 configuration
r2.endpoint=${R2_ENDPOINT}
r2.access-key-id=${R2_ACCESS_KEY_ID}
r2.secret-access-key=${R2_SECRET_ACCESS_KEY}
r2.bucket-name=${R2_BUCKET_NAME}
r2.region=auto

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# Actuator & Prometheus
management.endpoints.web.exposure.include=health,prometheus
management.endpoints.web.base-path=/actuator
management.metrics.export.prometheus.enabled=true
management.metrics.tags.application=file-sync-server

management.metrics.export.prometheus.pushgateway.enabled=true
management.metrics.export.prometheus.pushgateway.url=https://prometheus-prod-37-prod-ap-southeast-1.grafana.net/api/prom/push
management.metrics.export.prometheus.pushgateway.job=file-sync-server
management.metrics.export.prometheus.pushgateway.username=3212540
management.metrics.export.prometheus.pushgateway.password=${PROMETHEUS_TOKEN}